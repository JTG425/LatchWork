    <linearGradient id="lw" x1="24" y1="16" x2="47" y2="45" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a84ff"/>
      <stop offset="1" stop-color="#30d158"/>
    </linearGradient>
  </defs>
  <path d="M2 20 H6 M2 32 H6 M2 44 H6 M58 20 H62 M58 32 H62 M58 44 H62" stroke="#5a5a66" stroke-width="3" stroke-linecap="round"/>
  <rect x="6" y="6" width="52" height="52" rx="14" fill="#1f1f24" stroke="#45454f" stroke-width="2.5"/>
  <path d="M25 17 V45 H46" fill="none" stroke="url(#lw)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="25" cy="17" r="5" fill="#0a84ff"/>
  <circle cx="46" cy="45" r="5" fill="#30d158"/>
